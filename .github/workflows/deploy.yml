name: deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy using ssh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          password: ${{ secrets.PASSWORD }}
          #key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT}}
          script: |
            cd ~/Wolfybot 
            git pull origin main
            git status
            docker-compose up -d --build 
